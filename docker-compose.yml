version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: content-ip-workbench-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: content_ip_workbench
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:

